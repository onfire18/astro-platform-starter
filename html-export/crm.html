<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CRM Lite | AutoFlow</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:#0F0B1E;color:white;min-height:100vh}
a{text-decoration:none;color:inherit}
.inp{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:8px;color:white;padding:10px 12px;width:100%;font-size:0.875rem;outline:none;font-family:'Inter',sans-serif;transition:border-color 0.2s}
.inp::placeholder{color:#4B5563}
.inp:focus{border-color:#7C3AED}
select.inp{background:#1a1130}
select.inp option{background:#1a1130}
label{display:block;font-size:0.75rem;font-weight:500;color:#9CA3AF;margin-bottom:6px}
.card{background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.1);border-radius:16px;padding:24px;margin-bottom:16px}
.badge{display:inline-block;padding:2px 8px;border-radius:9999px;font-size:0.75rem;font-weight:500;border:1px solid}
.badge-new{background:rgba(59,130,246,0.15);color:#93C5FD;border-color:rgba(59,130,246,0.3)}
.badge-contacted{background:rgba(234,179,8,0.15);color:#FDE68A;border-color:rgba(234,179,8,0.3)}
.badge-converted{background:rgba(16,185,129,0.15);color:#6EE7B7;border-color:rgba(16,185,129,0.3)}
.badge-lost{background:rgba(239,68,68,0.15);color:#FCA5A5;border-color:rgba(239,68,68,0.3)}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.6);backdrop-filter:blur(4px);z-index:50;display:flex;align-items:center;justify-content:center;padding:16px}
.modal{background:#1a1130;border:1px solid rgba(255,255,255,0.15);border-radius:20px;padding:24px;width:100%;max-width:440px;max-height:90vh;overflow-y:auto}
.filter-btn{padding:6px 14px;border-radius:8px;font-size:0.8125rem;font-weight:500;border:1px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.03);color:#6B7280;cursor:pointer;font-family:'Inter',sans-serif;transition:all 0.2s;display:inline-flex;align-items:center;gap:6px}
.filter-btn.active{background:#7C3AED;color:white;border-color:#7C3AED}
.status-quick{padding:3px 8px;border-radius:6px;font-size:0.75rem;cursor:pointer;border:none;font-family:'Inter',sans-serif;background:transparent;color:#4B5563;transition:all 0.2s}
</style>
</head>
<body>

<!-- Nav -->
<nav style="max-width:1024px;margin:0 auto;padding:20px;display:flex;align-items:center;justify-content:space-between">
  <a href="index.html" style="display:flex;align-items:center;gap:10px">
    <div style="width:32px;height:32px;border-radius:8px;background:linear-gradient(135deg,#A78BFA,#6D28D9);display:flex;align-items:center;justify-content:center">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="white"><path d="M13 2L3 14H12L11 22L21 10H12L13 2Z"/></svg>
    </div>
    <span style="font-size:1.125rem;font-weight:700">AutoFlow</span>
  </a>
  <div style="display:flex;gap:8px">
    <a href="invoice.html" style="padding:6px 12px;font-size:0.875rem;color:#9CA3AF;border-radius:8px">Rechnung</a>
    <a href="instagram.html" style="padding:6px 12px;font-size:0.875rem;color:#9CA3AF;border-radius:8px">Instagram</a>
    <a href="crm.html" style="padding:6px 12px;font-size:0.875rem;color:#6EE7B7;background:rgba(16,185,129,0.15);border-radius:8px">CRM</a>
  </div>
</nav>

<div style="max-width:720px;margin:0 auto;padding:20px 20px 60px">
  <a href="index.html" style="display:inline-flex;align-items:center;gap:6px;color:#6B7280;font-size:0.875rem;margin-bottom:24px">← Zurück</a>

  <div style="display:flex;align-items:center;gap:12px;margin-bottom:28px">
    <div style="width:36px;height:36px;border-radius:8px;background:rgba(16,185,129,0.2);border:1px solid rgba(16,185,129,0.3);display:flex;align-items:center;justify-content:center;font-size:1.25rem">👥</div>
    <div>
      <h1 style="font-size:1.75rem;font-weight:700">CRM Lite</h1>
      <p style="color:#6B7280;font-size:0.875rem;margin-top:4px">Leads & Kontakte verwalten. Daten werden lokal gespeichert.</p>
    </div>
  </div>

  <!-- Toolbar -->
  <div style="display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap">
    <div style="position:relative;flex:1;min-width:200px">
      <svg style="position:absolute;left:10px;top:50%;transform:translateY(-50%);color:#4B5563" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input id="search-inp" class="inp" type="text" placeholder="Kontakte suchen…" style="padding-left:34px" oninput="renderContacts()">
    </div>
    <button onclick="openAdd()" style="padding:10px 18px;background:#7C3AED;color:white;font-size:0.875rem;font-weight:600;border-radius:8px;border:none;cursor:pointer;font-family:'Inter',sans-serif;white-space:nowrap;display:flex;align-items:center;gap:6px">
      <span style="font-size:1.125rem">+</span> Kontakt hinzufügen
    </button>
  </div>

  <!-- Filters -->
  <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:20px" id="filter-row"></div>

  <!-- Contact list -->
  <div id="contacts-container"></div>
</div>

<!-- Modal -->
<div id="modal" class="modal-overlay" style="display:none" onclick="handleOverlayClick(event)">
  <div class="modal" onclick="event.stopPropagation()">
    <h3 id="modal-title" style="font-size:1rem;font-weight:600;margin-bottom:20px">Neuer Kontakt</h3>
    <div style="display:grid;gap:12px">
      <div><label>Name *</label><input id="f-name" class="inp" type="text" placeholder="Max Mustermann"></div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
        <div><label>E-Mail</label><input id="f-email" class="inp" type="email" placeholder="max@beispiel.de"></div>
        <div><label>Telefon</label><input id="f-phone" class="inp" type="tel" placeholder="+49 123…"></div>
        <div><label>Firma</label><input id="f-company" class="inp" type="text" placeholder="GmbH / AG…"></div>
        <div>
          <label>Quelle</label>
          <select id="f-source" class="inp">
            <option value="">– wählen –</option>
            <option>Instagram</option><option>Website</option><option>Empfehlung</option>
            <option>Messe</option><option>E-Mail</option><option>Telefon</option><option>Sonstiges</option>
          </select>
        </div>
      </div>
      <div>
        <label>Status</label>
        <div style="display:flex;gap:8px;flex-wrap:wrap" id="status-selector"></div>
      </div>
      <div><label>Notizen</label><textarea id="f-notes" class="inp" rows="3" placeholder="Wichtige Infos, nächste Schritte…" style="resize:none"></textarea></div>
    </div>
    <div style="display:flex;gap:8px;margin-top:20px">
      <button onclick="closeModal()" style="flex:1;padding:10px;background:transparent;color:#6B7280;font-size:0.875rem;font-weight:500;border-radius:8px;border:none;cursor:pointer;font-family:'Inter',sans-serif">Abbrechen</button>
      <button id="modal-save-btn" onclick="saveContact()" style="flex:1;padding:10px;background:#7C3AED;color:white;font-size:0.875rem;font-weight:600;border-radius:8px;border:none;cursor:pointer;font-family:'Inter',sans-serif">Hinzufügen</button>
    </div>
  </div>
</div>

<footer style="border-top:1px solid rgba(255,255,255,0.1);padding:24px;text-align:center;color:#4B5563;font-size:0.875rem">
  © 2025 AutoFlow
</footer>

<script>
// ── Config ────────────────────────────────────────────────────────
const STATUSES = {
  new:       { label:'Neu',         cls:'badge-new' },
  contacted: { label:'Kontaktiert', cls:'badge-contacted' },
  converted: { label:'Gewonnen',    cls:'badge-converted' },
  lost:      { label:'Verloren',    cls:'badge-lost' },
};
const STORE_KEY = 'autoflow-crm-contacts';

// ── State ─────────────────────────────────────────────────────────
let contacts = [];
let activeFilter = 'all';
let editingId = null;
let formStatus = 'new';

// ── Storage ───────────────────────────────────────────────────────
function load() {
  try { contacts = JSON.parse(localStorage.getItem(STORE_KEY) || '[]'); } catch { contacts = []; }
}
function save() {
  localStorage.setItem(STORE_KEY, JSON.stringify(contacts));
}

// ── Init ──────────────────────────────────────────────────────────
window.addEventListener('load', function() {
  load();
  buildFilterRow();
  buildStatusSelector();
  renderContacts();
});

function buildFilterRow() {
  const row = document.getElementById('filter-row');
  const filters = [['all','Alle'],['new','Neu'],['contacted','Kontaktiert'],['converted','Gewonnen'],['lost','Verloren']];
  filters.forEach(function(f) {
    const btn = document.createElement('button');
    btn.className = 'filter-btn' + (f[0] === activeFilter ? ' active' : '');
    btn.id = 'filter-'+f[0];
    btn.onclick = function() { activeFilter = f[0]; updateFilterBtns(); renderContacts(); };
    btn.textContent = f[1];
    row.appendChild(btn);
  });
}

function updateFilterBtns() {
  ['all','new','contacted','converted','lost'].forEach(function(f) {
    const btn = document.getElementById('filter-'+f);
    if (f === activeFilter) btn.classList.add('active'); else btn.classList.remove('active');
  });
}

function buildStatusSelector() {
  const sel = document.getElementById('status-selector');
  Object.entries(STATUSES).forEach(function(entry) {
    const key = entry[0], cfg = entry[1];
    const btn = document.createElement('button');
    btn.id = 'ss-'+key;
    btn.style.cssText = 'padding:6px 14px;border-radius:8px;font-size:0.8125rem;font-weight:500;border:1px solid rgba(255,255,255,0.1);background:transparent;color:#6B7280;cursor:pointer;font-family:Inter;transition:all 0.2s';
    btn.textContent = cfg.label;
    btn.onclick = function() { setFormStatus(key); };
    sel.appendChild(btn);
  });
  setFormStatus('new');
}

function setFormStatus(s) {
  formStatus = s;
  Object.keys(STATUSES).forEach(function(k) {
    const btn = document.getElementById('ss-'+k);
    if (!btn) return;
    if (k === s) {
      const cls = STATUSES[k].cls;
      const colors = { 'badge-new':'rgba(59,130,246,0.2);color:#93C5FD;border-color:rgba(59,130,246,0.4)', 'badge-contacted':'rgba(234,179,8,0.2);color:#FDE68A;border-color:rgba(234,179,8,0.4)', 'badge-converted':'rgba(16,185,129,0.2);color:#6EE7B7;border-color:rgba(16,185,129,0.4)', 'badge-lost':'rgba(239,68,68,0.2);color:#FCA5A5;border-color:rgba(239,68,68,0.4)' };
      btn.style.cssText = 'padding:6px 14px;border-radius:8px;font-size:0.8125rem;font-weight:500;border:1px solid;background:'+colors[cls]+';cursor:pointer;font-family:Inter';
    } else {
      btn.style.cssText = 'padding:6px 14px;border-radius:8px;font-size:0.8125rem;font-weight:500;border:1px solid rgba(255,255,255,0.1);background:transparent;color:#6B7280;cursor:pointer;font-family:Inter';
    }
  });
}

// ── Render contacts ───────────────────────────────────────────────
function renderContacts() {
  const q = document.getElementById('search-inp').value.toLowerCase();
  const filtered = contacts.filter(function(c) {
    if (activeFilter !== 'all' && c.status !== activeFilter) return false;
    if (q && !c.name.toLowerCase().includes(q) && !c.email.toLowerCase().includes(q) && !(c.company||'').toLowerCase().includes(q)) return false;
    return true;
  });

  // Update filter counts
  ['all','new','contacted','converted','lost'].forEach(function(f) {
    const count = f === 'all' ? contacts.length : contacts.filter(function(c){return c.status===f;}).length;
    const btn = document.getElementById('filter-'+f);
    const label = {all:'Alle',new:'Neu',contacted:'Kontaktiert',converted:'Gewonnen',lost:'Verloren'}[f];
    btn.textContent = label + ' (' + count + ')';
  });

  const container = document.getElementById('contacts-container');
  if (filtered.length === 0) {
    container.innerHTML = '<div style="text-align:center;padding:64px 0;color:#4B5563"><div style="font-size:3rem;margin-bottom:12px">📋</div><p style="font-size:0.875rem">'+(contacts.length===0?'Noch keine Kontakte. Füge deinen ersten hinzu!':'Keine Kontakte gefunden.')+'</p></div>';
    return;
  }

  container.innerHTML = '';
  filtered.forEach(function(c) {
    const div = document.createElement('div');
    div.style.cssText = 'background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.1);border-radius:16px;padding:16px;margin-bottom:12px';
    div.innerHTML =
      '<div style="display:flex;align-items:flex-start;justify-content:space-between;gap:12px">' +
        '<div style="display:flex;align-items:flex-start;gap:12px;min-width:0">' +
          '<div style="width:40px;height:40px;border-radius:50%;background:rgba(124,58,237,0.2);border:1px solid rgba(124,58,237,0.25);display:flex;align-items:center;justify-content:center;font-size:1rem;font-weight:600;color:#A78BFA;flex-shrink:0">'+c.name.charAt(0).toUpperCase()+'</div>' +
          '<div style="min-width:0">' +
            '<div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">' +
              '<span style="font-weight:600;font-size:0.9375rem">'+esc(c.name)+'</span>' +
              '<span class="badge '+STATUSES[c.status].cls+'">'+STATUSES[c.status].label+'</span>' +
            '</div>' +
            '<div style="display:flex;flex-wrap:wrap;gap:12px;margin-top:4px">' +
              (c.company?'<span style="font-size:0.8125rem;color:#6B7280">🏢 '+esc(c.company)+'</span>':'')+
              (c.email?'<span style="font-size:0.8125rem;color:#6B7280">✉️ '+esc(c.email)+'</span>':'')+
              (c.phone?'<span style="font-size:0.8125rem;color:#6B7280">📞 '+esc(c.phone)+'</span>':'')+
              (c.source?'<span style="font-size:0.75rem;color:#4B5563">via '+esc(c.source)+'</span>':'')+
            '</div>' +
            (c.notes?'<p style="font-size:0.8125rem;color:#4B5563;margin-top:6px;line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden">'+esc(c.notes)+'</p>':'')+
          '</div>' +
        '</div>' +
        '<div style="display:flex;gap:4px;flex-shrink:0">' +
          '<button onclick="openEdit(\''+c.id+'\')" title="Bearbeiten" style="width:32px;height:32px;border-radius:8px;background:transparent;border:none;cursor:pointer;color:#4B5563;display:flex;align-items:center;justify-content:center" onmouseover="this.style.color=\'white\';this.style.background=\'rgba(255,255,255,0.1)\'" onmouseout="this.style.color=\'#4B5563\';this.style.background=\'transparent\'">' +
            '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>' +
          '</button>' +
          '<button onclick="deleteContact(\''+c.id+'\')" title="Löschen" style="width:32px;height:32px;border-radius:8px;background:transparent;border:none;cursor:pointer;color:#4B5563;display:flex;align-items:center;justify-content:center" onmouseover="this.style.color=\'#F87171\';this.style.background=\'rgba(248,113,113,0.1)\'" onmouseout="this.style.color=\'#4B5563\';this.style.background=\'transparent\'">' +
            '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg>' +
          '</button>' +
        '</div>' +
      '</div>' +
      '<div style="display:flex;gap:6px;align-items:center;margin-top:12px;padding-top:12px;border-top:1px solid rgba(255,255,255,0.05)">' +
        '<span style="font-size:0.75rem;color:#374151;margin-right:4px">Status:</span>' +
        Object.entries(STATUSES).map(function(e){
          return '<button class="status-quick" onclick="quickStatus(\''+c.id+'\',\''+e[0]+'\')" '+(c.status===e[0]?'style="padding:3px 8px;border-radius:6px;font-size:0.75rem;cursor:pointer;border:none;font-family:Inter;background:transparent;color:#A78BFA;font-weight:600"':'style="padding:3px 8px;border-radius:6px;font-size:0.75rem;cursor:pointer;border:none;font-family:Inter;background:transparent;color:#4B5563"')+'>'+e[1].label+'</button>';
        }).join('') +
      '</div>';
    container.appendChild(div);
  });
}

function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ── Modal ─────────────────────────────────────────────────────────
function openAdd() {
  editingId = null;
  document.getElementById('modal-title').textContent = 'Neuer Kontakt';
  document.getElementById('modal-save-btn').textContent = 'Hinzufügen';
  ['name','email','phone','company'].forEach(function(f){ document.getElementById('f-'+f).value = ''; });
  document.getElementById('f-source').value = '';
  document.getElementById('f-notes').value = '';
  setFormStatus('new');
  document.getElementById('modal').style.display = 'flex';
  document.getElementById('f-name').focus();
}

function openEdit(id) {
  const c = contacts.find(function(x){return x.id===id;});
  if (!c) return;
  editingId = id;
  document.getElementById('modal-title').textContent = 'Kontakt bearbeiten';
  document.getElementById('modal-save-btn').textContent = 'Speichern';
  document.getElementById('f-name').value = c.name || '';
  document.getElementById('f-email').value = c.email || '';
  document.getElementById('f-phone').value = c.phone || '';
  document.getElementById('f-company').value = c.company || '';
  document.getElementById('f-source').value = c.source || '';
  document.getElementById('f-notes').value = c.notes || '';
  setFormStatus(c.status || 'new');
  document.getElementById('modal').style.display = 'flex';
}

function closeModal() { document.getElementById('modal').style.display = 'none'; }
function handleOverlayClick(e) { if (e.target === document.getElementById('modal')) closeModal(); }

function saveContact() {
  const name = document.getElementById('f-name').value.trim();
  if (!name) { alert('Name ist ein Pflichtfeld.'); return; }
  if (editingId) {
    contacts = contacts.map(function(c) {
      if (c.id !== editingId) return c;
      return Object.assign({},c,{
        name: name,
        email: document.getElementById('f-email').value.trim(),
        phone: document.getElementById('f-phone').value.trim(),
        company: document.getElementById('f-company').value.trim(),
        source: document.getElementById('f-source').value,
        notes: document.getElementById('f-notes').value.trim(),
        status: formStatus,
      });
    });
  } else {
    contacts.unshift({
      id: Date.now().toString(),
      name: name,
      email: document.getElementById('f-email').value.trim(),
      phone: document.getElementById('f-phone').value.trim(),
      company: document.getElementById('f-company').value.trim(),
      source: document.getElementById('f-source').value,
      notes: document.getElementById('f-notes').value.trim(),
      status: formStatus,
      createdAt: new Date().toISOString(),
    });
  }
  save();
  closeModal();
  renderContacts();
}

function quickStatus(id, status) {
  contacts = contacts.map(function(c){ return c.id===id ? Object.assign({},c,{status:status}) : c; });
  save();
  renderContacts();
}

function deleteContact(id) {
  if (!confirm('Kontakt wirklich löschen?')) return;
  contacts = contacts.filter(function(c){ return c.id !== id; });
  save();
  renderContacts();
}
</script>
</body>
</html>
