name: Deploy AutoFlow to GitHub Pages

on:
  push:
    branches:
      - claude/automation-app-invoicing-h24v33
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload html-export folder
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./html-export

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
